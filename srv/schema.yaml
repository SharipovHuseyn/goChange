              $ref: '#/components/schemas/PatchedUserCurrencyUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserCurrencyUpdate'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success'
              examples:
                Success:
                  value:
                    success: true
                  summary: success
                  description: Success
          description: Success
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'
              examples:
                AuthNotProvided:
                  value:
                    detail: Authentication credentials were not provided.
                  summary: auth not provided
                  description: Unauthorized
          description: Unauthorized
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthError'
              examples:
                InternalServerError:
                  value:
                    detail: Server error.
                  summary: internal server error
                  description: Internal server error
          description: Internal server error
