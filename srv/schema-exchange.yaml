{
  "openapi": "3.0.3",
  "info": {
    "title": "Wallet Exchange API",
    "version": "1.0.0"
  },
  "servers": [
    {
      "url": "/"
    }
  ],
  "paths": {
    "/wallet/api/exchange": {
      "post": {
        "tags": [
          "Exchange"
        ],
        "operationId": "createExchange",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CreateExchange"
              }
            }
          },
          "required": true
        },
        "responses": {
          "201": {
            "description": "Exchange created",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/Transaction"
                }
              }
            }
          },
          "400": {
            "description": "Validation error"
          },
          "401": {
            "description": "Unauthorized"
          },
          "503": {
            "description": "Exchange unavailable"
          }
        },
        "security": [
          {
            "cookieAuth": []
          }
        ]
      }
    },
    "/wallet/api/exchange/validate": {
      "get": {
        "tags": [
          "Exchange"
        ],
        "operationId": "validateExchange",
        "parameters": [
          {
            "name": "exchange_pair",
            "in": "query",
            "required": true,
            "schema": {
              "type": "integer"
            }
          },
          {
            "name": "amount",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Validation result",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ExchangeValidation"
                }
              }
            }
          },
          "400": {
            "description": "Validation error"
          }
        },
        "security": [
          {
            "cookieAuth": []
          }
        ]
      }
    },
    "/wallet/api/exchange/max-amount": {
      "get": {
        "tags": [
          "Exchange"
        ],
        "operationId": "getMaxExchangeAmount",
        "parameters": [
          {
            "name": "exchange_pair",
            "in": "query",
            "required": true,
            "schema": {
              "type": "integer"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Max available amount",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/MaxExchangeAmount"
                }
              }
            }
          }
        },
        "security": [
          {
            "cookieAuth": []
          }
        ]
      }
    },
    "/wallet/api/exchange/pairs": {
      "get": {
        "tags": [
          "Exchange"
        ],
        "operationId": "listExchangePairs",
        "parameters": [
          {
            "name": "from_coin",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "to_coin",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Available exchange pairs",
            "content": {
              "application/json": {
                "schema": {
                  "type": "array",
                  "items": {
                    "$ref": "#/components/schemas/ExchangePair"
                  }
                }
              }
            }
          }
        },
        "security": [
          {
            "cookieAuth": []
          }
        ]
      }
    }
  },
  "components": {
    "schemas": {
      "CreateExchange": {
        "required": [
          "amount",
          "exchange_pair"
        ],
        "type": "object",
        "properties": {
          "exchange_pair": {
            "type": "integer"
          },
          "amount": {
            "pattern": "^\\d+(\\.\\d+)?$",
            "type": "string",
            "format": "decimal"
          }
        }
      },
      "ExchangeValidation": {
        "type": "object",
        "properties": {
          "exchange_pair": {
            "type": "integer"
          },
          "amount": {
            "type": "string"
          },
          "receive_amount": {
            "type": "string"
          },
          "receive_currency": {
            "type": "string"
          }
        }
      },
      "ExchangePair": {
        "required": [
          "available",
          "from_coin",
          "id",
          "to_coin"
        ],
        "type": "object",
        "properties": {
          "id": {
            "type": "integer"
          },
          "from_coin": {
            "type": "string"
          },
          "to_coin": {
            "type": "string"
          },
          "available": {
            "type": "boolean"
          }
        }
      },
      "MaxExchangeAmount": {
        "type": "object",
        "properties": {
          "amount": {
            "type": "string"
          }
        }
      },
      "Exchange": {
        "type": "object",
        "properties": {
          "id": {
            "type": "string",
            "format": "uuid"
          },
          "from_coin": {
            "type": "string"
          },
          "from_currency": {
            "type": "string"
          },
          "to_coin": {
            "type": "string"
          },
          "to_currency": {
            "type": "string"
          },
          "status": {
            "$ref": "#/components/schemas/ExchangeStatus"
          },
          "created_at": {
            "type": "integer"
          }
        }
      },
      "ExchangeStatus": {
        "type": "string",
        "enum": [
          "pending",
          "completed",
          "cancelled"
        ]
      },
      "Transaction": {
        "type": "object",
        "properties": {
          "id": {
            "type": "string",
            "format": "uuid"
          },
          "coin": {
            "type": "string"
          },
          "currency": {
            "type": "string"
          },
          "amount": {
            "type": "string"
          },
          "commission": {
            "type": "string"
          },
          "full_amount": {
            "type": "string"
          },
          "status": {
            "type": "string"
          },
          "in_exchange": {
            "$ref": "#/components/schemas/Exchange"
          },
          "out_exchange": {
            "$ref": "#/components/schemas/Exchange"
          },
          "created_at": {
            "type": "integer"
          }
        }
      }
    },
    "securitySchemes": {
      "cookieAuth": {
        "type": "apiKey",
        "name": "sessionid",
        "in": "cookie"
      }
    }
  }
}