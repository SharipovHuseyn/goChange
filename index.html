<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />

    <style>.lds-ring.centered {position:absolute;top:50%;left:50%;margin-left:-40px;margin-top:-40px;}.lds-ring {width: 80px;height: 80px;}.lds-ring div {box-sizing: border-box;display: block;position: absolute;width: 64px;height: 64px;margin: 8px;border: 8px solid #ccc;border-radius: 50%;animation: lds-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;border-color: #ccc transparent transparent transparent;z-index:2;}.lds-ring div:nth-child(1), .lds-ring-small div:nth-child(1) {animation-delay: -0.45s;}.lds-ring div:nth-child(2), .lds-ring-small div:nth-child(2) {animation-delay: -0.3s;}.lds-ring div:nth-child(3), .lds-ring-small div:nth-child(3) {animation-delay: -0.15s;}@keyframes lds-ring {0% {transform: rotate(0deg);} 100% {transform: rotate(360deg);}}.lds-ring-small {width: 20px;height: 20px;}.lds-ring-small.centered {position:absolute;top:50%;left:50%;margin-left:-10px;margin-top:-10px;}.lds-ring-small div {box-sizing: border-box;display: block;position: absolute;width: 20px;height: 20px;border: 3px solid #ccc;border-radius: 50%;animation: lds-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;border-color: #ccc transparent transparent transparent;z-index:2;}</style>
    <title>GoChange</title>
  </head>
  <body>
    <div id="root"><div class='lds-ring centered'><div></div><div></div><div></div><div></div></div></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
